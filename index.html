<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Star Strike RUSH</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    font-family: "Arial Narrow", Arial, sans-serif;
  }
  canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W = 0, H = 0;
let devSkipCooldown = 0;
const DEV_SKIP_COOLDOWN_FRAMES = 48;
let MAX_PARTICLES = 900;
let enemyIdCounter = 1;

const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
const rand = (min, max) => min + Math.random() * (max - min);
const TAU = Math.PI * 2;

const STORAGE_KEY = "star_strike_rush_high_score_v1";
let highScore = 0;
let previousHighScore = 0;
let highScoreDirty = false;

let callSign = "";
let callSignEditing = false;
let callSignCursorBlink = 0;
let titleSubState = "main";
let titlePanelAnim = 0.0;
let titlePanelTarget = 0.0;
let playBtnHold = 0;
let playBtnPointerDown = false;
let playBtnPointerInside = false;
let settingMaxParticles = 900;
let settingScreenShake = true;
let respawnHold = 0;
let respawnPointerDown = false;
let respawnPointerInside = false;
let codexDiscovered = {};
let encounterQueue = [];
let encounterCard = null;
const ENCOUNTER_CARD_DURATION = 210;
let codexDetailType = null;

const FONT_TITLE = "900 52px Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif";
const FONT_HUGE = "900 58px Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif";
const FONT_SUBTITLE = "700 18px 'Arial Narrow', Arial, sans-serif";
const FONT_HUD = "700 16px 'Arial Narrow', Arial, sans-serif";
const FONT_COMBO = "900 20px Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif";
const FONT_SMALL = "700 12px 'Arial Narrow', Arial, sans-serif";
const FONT_TINY = "700 10px 'Arial Narrow', Arial, sans-serif";
const FONT_BUTTON = "900 15px 'Arial Narrow', Arial, sans-serif";

const ENEMY_DATA = {
  red:     { threat: 1.05, score: 30, radius: 12, hp: 2 },
  orange:  { threat: 0.80, score: 20, radius: 10, hp: 1 },
  purple:  { threat: 3.55, score: 150, radius: 17, hp: 5 },
  phantom: { threat: 2.35, score: 100, radius: 14, hp: 3 }
};

const BOSS_SCORE = { standard: 1000, wraith: 1700 };

function hexToRgb(hex) {
  const s = hex.replace("#", "").trim();
  const v = s.length === 3 ? s.split("").map(ch => ch + ch).join("") : s;
  const n = parseInt(v, 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}
function mixHex(a, b, t) {
  const c1 = hexToRgb(a), c2 = hexToRgb(b), u = clamp(t, 0, 1);
  const r = Math.round(c1.r + (c2.r - c1.r) * u);
  const g = Math.round(c1.g + (c2.g - c1.g) * u);
  const bl = Math.round(c1.b + (c2.b - c1.b) * u);
  return `rgb(${r},${g},${bl})`;
}
function sanitizeCallSign(s) {
  return String(s || "")
    .toUpperCase()
    .replace(/[^A-Z0-9_]/g, "")
    .slice(0, 12);
}
function loadHighScore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const n = raw ? parseInt(raw, 10) : 0;
    highScore = Number.isFinite(n) ? n : 0;
  } catch { highScore = 0; }
}
function saveHighScore() {
  try { localStorage.setItem(STORAGE_KEY, String(highScore)); highScoreDirty = false; } catch {}
}
function saveCallSign() {
  try { localStorage.setItem("star_strike_rush_callsign_v1", callSign); } catch {}
}
function saveSettings() {
  try {
    localStorage.setItem("star_strike_rush_settings_v1", JSON.stringify({
      settingMaxParticles,
      settingScreenShake
    }));
  } catch {}
}
function saveCodexDiscovered() {
  try { localStorage.setItem("star_strike_rush_codex_v1", JSON.stringify(codexDiscovered)); } catch {}
}
function loadCallSign() {
  try {
    const raw = localStorage.getItem("star_strike_rush_callsign_v1");
    callSign = sanitizeCallSign(raw || "");
  } catch {
    callSign = "";
  }
}
function loadSettings() {
  try {
    const raw = localStorage.getItem("star_strike_rush_settings_v1");
    if (!raw) return;
    const obj = JSON.parse(raw);
    if (obj && (obj.settingMaxParticles === 300 || obj.settingMaxParticles === 600 || obj.settingMaxParticles === 900)) {
      settingMaxParticles = obj.settingMaxParticles;
    }
    if (obj && typeof obj.settingScreenShake === "boolean") {
      settingScreenShake = obj.settingScreenShake;
    }
  } catch {}
  MAX_PARTICLES = settingMaxParticles;
}
function loadCodexDiscovered() {
  try {
    const raw = localStorage.getItem("star_strike_rush_codex_v1");
    const obj = raw ? JSON.parse(raw) : {};
    codexDiscovered = obj && typeof obj === "object" ? obj : {};
  } catch {
    codexDiscovered = {};
  }
}
function saveMilestone() { if (highScoreDirty) saveHighScore(); }
function kickShake(amount) {
  if (!settingScreenShake) return;
  state.fx.shake = Math.max(state.fx.shake, amount);
}

function showNextMessage() {
  if (state.messageQueue.length > 0) {
    const m = state.messageQueue.shift();
    state.message = m.text;
    state.messageTimer = m.frames;
    state.messageMax = m.frames;
  } else {
    state.message = "";
    state.messageTimer = 0;
    state.messageMax = 0;
  }
}
function showMessage(text, frames = 90) {
  const item = { text, frames };
  if (state.messageTimer > 0 || state.messageQueue.length > 0) state.messageQueue.push(item);
  else {
    state.message = text;
    state.messageTimer = frames;
    state.messageMax = frames;
  }
}
function circleHit(ax, ay, ar, bx, by, br) { return Math.hypot(ax - bx, ay - by) < ar + br; }
function laneCenters() { return [W * 0.22, W * 0.50, W * 0.78]; }
function laneIndexFromX(x) { if (x < W / 3) return 0; if (x < (2 * W) / 3) return 1; return 2; }
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function wrapAngle(a) { while (a > Math.PI) a -= TAU; while (a < -Math.PI) a += TAU; return a; }
function waveItem(type, x, y, delay = 0, extra = {}) { return { type, x, y, delay, extra }; }
function isWraithActive() { return !!(state.boss && state.boss.mode === "wraith"); }
function bossHudOffset() { return (state.boss || state.bossDeath) ? 32 : 0; }
function getPlayerShotKind() { return isWraithActive() ? (state.playerRealm === 1 ? "ghost" : "physical") : "physical"; }
function enemyBulletCost(kind) {
  if (kind === "aimed") return 1.25;
  if (kind === "boss") return 1.5;
  if (kind === "phantomShot") return 1.0;
  if (kind === "purple") return 1.0;
  if (kind === "wraithPhysical" || kind === "wraithGhost") return 1.05;
  return 0.9;
}
function enemyBulletPressure() { let total = 0; for (const b of state.enemyBullets) total += enemyBulletCost(b.kind); return total; }
function enemyBulletBudget() {
  let base = 11 + state.phase * 1.4;
  if (state.phase === 1) base = 8.5 + state.phaseTimer / 240;
  if (state.player.hp <= 2) base -= 2.0;
  if (state.player.hp === 1) base -= 1.0;
  if (state.difficulty.grace > 0) base -= 2.0;
  if (state.difficulty.ghostGrace > 0) base -= 1.2;
  if (state.boss) base -= 1.5;
  base -= state.difficulty.burst * 3.5;
  if (state.intensityPhase === "surge") base += 2.0;
  if (state.intensityPhase === "cooldown") base -= 1.3;
  return clamp(base * state.difficulty.threat, 8, 26);
}
function canSpendBulletBudget(cost) {
  const budget = state.cachedBulletBudget || enemyBulletBudget();
  const load = (state.cachedBulletPressure || enemyBulletPressure()) + (state.frameBulletSpent || 0);
  return load + cost <= budget;
}
function spendBulletBudget(cost) { state.frameBulletSpent = (state.frameBulletSpent || 0) + cost; }
function titleLaneYs() { return [H * 0.14, H * 0.24, H * 0.34, H * 0.44]; }

const state = {
  player: null,
  bullets: [],
  enemyBullets: [],
  enemies: [],
  powerups: [],
  particles: [],
  boss: null,
  bossDeath: null,
  bossRecovery: 0,
  wingmen: [],
  pendingSpawns: [],
  stars: [],
  titleFormations: [],
  titleLaneCooldowns: [0, 0, 0, 0],
  titleLaneCursor: 0,
  titleSpawnTimer: 0,
  score: 0,
  multiplier: 1,
  comboKills: 0,
  comboPulse: 0,
  phase: 1,
  frame: 0,
  waveTimer: 0,
  phaseTimer: 0,
  waveIndex: 0,
  waveRest: 0,
  pressure: 20,
  threatScore: 0,
  cachedBulletPressure: 0,
  cachedBulletBudget: 0,
  frameBulletSpent: 0,
  message: "",
  messageTimer: 0,
  messageMax: 0,
  messageQueue: [],
  fx: { shake: 0, flash: 0 },
  gameOverShake: 0,
  gameOverShakeTimer: 0,
  difficulty: {
    threat: 0.75,
    target: 0.75,
    grace: 0,
    ghostGrace: 0,
    heatStreak: false,
    lastHitFrame: -999,
    killStreak: 0,
    burst: 0,
    shotsFired: 0,
    shotsHit: 0,
    pacingMemory: 0
  },
  keyboard: { up: false, down: false, left: false, right: false },
  joystick: { active: false, id: null, cx: 0, cy: 0, ax: 0, ay: 0, radius: 56 },
  playerRealm: 0,
  devStatsVisible: false,
  killsSinceLastDrop: 0,
  framesSinceLastDrop: 0,
  powerupDropCooldown: 0,
  lastBossMode: null,
  intensityPhase: "normal",
  intensityTimer: 180,
  waveMood: "open",
  waveMoodTimer: 120,
  lastWaveTemplateName: null,
  gameState: "start"
};

function makePlayer() {
  return {
    x: W / 2,
    y: H * 0.80,
    vx: 0,
    vy: 0,
    hp: 5,
    maxHp: 5,
    energy: 100,
    maxEnergy: 100,
    inv: 0,
    fire: 0,
    spread: 0,
    rapid: 0,
    ghostTimer: 0,
    ghostCooldown: 0,
    maxSpeed: 5.2
  };
}
function refreshMultiplier() {
  const prev = state.multiplier || 1;
  const next = clamp(1 + Math.floor(state.comboKills / 7), 1, 4);
  state.multiplier = next;
  if (next > prev) state.comboPulse = 120;
}
function addScore(basePoints) {
  const pts = Math.round(basePoints * state.multiplier);
  state.score += pts;
  if (state.score > highScore) { highScore = state.score; highScoreDirty = true; }
}
function addFlatScore(points) {
  state.score += points;
  if (state.score > highScore) { highScore = state.score; highScoreDirty = true; }
}
function noteKill(basePoints) { state.comboKills++; state.difficulty.killStreak++; refreshMultiplier(); addScore(basePoints); }
function resetCombo() { state.comboKills = 0; refreshMultiplier(); state.difficulty.killStreak = 0; }

function enforceParticleCap() { if (state.particles.length > MAX_PARTICLES) state.particles.splice(0, state.particles.length - MAX_PARTICLES); }
function spawnParticles(x, y, count = 12, color = "#fff", speed = 1) {
  for (let i = 0; i < count; i++) {
    const ang = rand(0, TAU);
    const sp = rand(0.8, 3.5) * speed;
    state.particles.push({
      x, y,
      vx: Math.cos(ang) * sp + rand(-0.4, 0.4),
      vy: Math.sin(ang) * sp + rand(-0.4, 0.4),
      life: rand(16, 32),
      size: rand(1.5, 3.5),
      color
    });
  }
  enforceParticleCap();
}
function spawnDeathBurst(x, y, count = 16) {
  for (let i = 0; i < count; i++) {
    const ang = rand(0, TAU);
    const sp = rand(2.2, 5.0);
    state.particles.push({
      x, y,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp,
      life: rand(14, 26),
      size: rand(1.8, 4.2),
      color: "#fff"
    });
  }
  enforceParticleCap();
}
function spawnRapidFireMuzzleParticles(x, y) {
  const count = 6 + Math.floor(Math.random() * 4);
  for (let i = 0; i < count; i++) {
    const hot = i < 2;
    state.particles.push({
      x: x + rand(-1.6, 1.6),
      y: y + rand(-1.1, 1.1),
      vx: rand(-1.0, 1.0),
      vy: rand(-2.6, -0.5),
      life: rand(8, 16),
      size: rand(1.2, 2.3),
      color: hot ? "rgba(255,240,180,0.95)" : (Math.random() < 0.5 ? "rgba(255,170,70,0.92)" : "rgba(255,255,255,0.88)")
    });
  }
  enforceParticleCap();
}
function spawnPowerupAt(x, y, type) { state.powerups.push({ x, y, type, vy: 1.9, size: 11, life: 900 }); }
function countBulletsByKind(kind) { let n = 0; for (const b of state.enemyBullets) if (b.kind === kind) n++; return n; }
function activePurpleCount() { let n = 0; for (const e of state.enemies) if (e.type === "purple") n++; return n; }
function activePhantomCount() { let n = 0; for (const e of state.enemies) if (e.type === "phantom") n++; return n; }
function phantomCapForPhase() { if (state.phase >= 13) return 5; if (state.phase >= 10) return 4; return 3; }
function safePowerupType() {
  const lowHp = state.player.hp <= 2;
  const r = Math.random();
  if (lowHp) {
    if (r < 0.34) return "repair";
    if (r < 0.58) return "wingman";
    if (r < 0.74) return "dual";
    if (r < 0.87) return "spread";
    return "rapid";
  } else {
    if (r < 0.35) return "spread";
    if (r < 0.70) return "rapid";
    if (r < 0.88) return "repair";
    if (r < 0.95) return "wingman";
    return "dual";
  }
}
function registerPowerupDrop(cooldownMin = 240, cooldownMax = 360) {
  state.killsSinceLastDrop = 0;
  state.framesSinceLastDrop = 0;
  state.powerupDropCooldown = cooldownMin + Math.floor(rand(0, Math.max(1, cooldownMax - cooldownMin)));
}
function shouldDropPowerupNow() {
  if (state.powerupDropCooldown > 0) return false;
  if (state.killsSinceLastDrop >= 12) return true;
  if (state.framesSinceLastDrop >= 900) return true;
  const drought = clamp((state.framesSinceLastDrop - 240) / 660, 0, 1);
  const killFactor = clamp((state.killsSinceLastDrop - 1) / 6, 0, 1);
  let chance = 0.022 + drought * 0.16 + killFactor * 0.11;
  if (state.player.hp <= 2) chance += 0.03;
  if (state.phase >= 10) chance += 0.01;
  if (state.intensityPhase === "cooldown") chance += 0.05;
  if (state.intensityPhase === "surge") chance -= 0.02;
  return Math.random() < chance;
}
function dropPowerup(x, y) { spawnPowerupAt(x, y, safePowerupType()); }
function bossRewardDrops(x, y) {
  const primary = Math.random() < 0.5 ? "spread" : "rapid";
  spawnPowerupAt(x - 18, y - 2, primary);
  if (Math.random() < 0.5) {
    const pool = ["spread", "rapid", "repair", "wingman", "dual"];
    spawnPowerupAt(x + 18, y + 2, pool[Math.floor(Math.random() * pool.length)]);
  }
}
function chooseLane(exclude = []) {
  const counts = [0, 0, 0];
  for (const e of state.enemies) {
    if (e.escape) continue;
    counts[laneIndexFromX(e.x)]++;
  }
  let best = [], min = Infinity;
  for (let i = 0; i < 3; i++) {
    if (exclude.includes(i)) continue;
    if (counts[i] < min) { min = counts[i]; best = [i]; }
    else if (counts[i] === min) best.push(i);
  }
  if (!best.length) return 1;
  return best[Math.floor(Math.random() * best.length)];
}
function laneX(lane) { return laneCenters()[lane]; }
function getWingman(side) { return state.wingmen.find(w => w.side === side) || null; }
function refreshWingmen(timer = 1500) { for (const w of state.wingmen) w.timer = Math.max(w.timer, timer); }
function addWingmanSide(side, timer = 1500) {
  const existing = getWingman(side);
  if (existing) { existing.timer = Math.max(existing.timer, timer); return existing; }
  const p = state.player;
  const w = { x: p.x + side * 30, y: p.y + 4, side, timer, fire: 0 };
  state.wingmen.push(w);
  return w;
}
function spawnWingmen(count) {
  const timer = 1500;
  if (count >= 2) {
    addWingmanSide(-1, timer); addWingmanSide(1, timer);
    if (state.wingmen.length === 2) refreshWingmen(timer);
    return;
  }
  if (!getWingman(-1)) addWingmanSide(-1, timer);
  else if (!getWingman(1)) addWingmanSide(1, timer);
  else refreshWingmen(timer);
}
function fireWingman(w) {
  if (w.fire > 0) return;
  state.bullets.push({ x: w.x, y: w.y - 12, vx: 0, vy: -8.2, life: 80, r: 3, kind: getPlayerShotKind(), realm: state.playerRealm, damage: 0.75 });
  w.fire = 18;
}
function currentInputVector() {
  let x = 0, y = 0;
  if (state.keyboard.left) x -= 1;
  if (state.keyboard.right) x += 1;
  if (state.keyboard.up) y -= 1;
  if (state.keyboard.down) y += 1;
  if (state.joystick.active) { x += state.joystick.ax; y += state.joystick.ay; }
  const mag = Math.hypot(x, y);
  if (mag > 1) { x /= mag; y /= mag; }
  return { x, y };
}

function attemptGhost() {
  if (state.gameState !== "playing") return;
  const p = state.player;
  if (isWraithActive()) {
    const cost = 18;
    if (p.energy < cost) return;
    p.energy -= cost;
    state.playerRealm = 1 - state.playerRealm;
    state.fx.flash = Math.max(state.fx.flash, 4);
    state.comboPulse = Math.max(state.comboPulse, 6);
    spawnParticles(p.x, p.y, 10, state.playerRealm === 0 ? "#bfe8ff" : "#d9b6ff", 0.9);
    return;
  }
  if (p.energy < 35 || p.ghostCooldown > 0) return;
  const input = currentInputVector();
  let dx = input.x, dy = input.y;
  const vMag = Math.hypot(p.vx, p.vy);
  if (Math.abs(dx) + Math.abs(dy) < 0.1 && vMag > 0.2) { dx = p.vx / vMag; dy = p.vy / vMag; }
  if (Math.abs(dx) + Math.abs(dy) < 0.1) { dx = 0; dy = -1; }
  p.vx += dx * 4.6;
  p.vy += dy * 4.6;
  p.ghostTimer = 18;
  p.inv = 24;
  p.ghostCooldown = 20;
  p.energy -= 35;
  state.difficulty.ghostGrace = 60;
  state.fx.flash = Math.max(state.fx.flash, 6);
  spawnParticles(p.x, p.y, 10, "#fff", 1.05);
}

function updateStars() {
  for (const s of state.stars) {
    s.y += s.spd;
    if (s.y > H + 4) { s.y = -4; s.x = Math.random() * W; }
  }
}

function phaseDuration(phase) {
  if (phase === 1) return 1100;
  if (phase === 2) return 980;
  if (phase === 3) return 880;
  return Math.max(500, 840 - (phase - 4) * 22);
}
function rhythmProfile() {
  if (state.boss || state.bossDeath) return { pressure: 0, interval: 0 };
  const beat = state.phaseTimer % 240;
  if (beat < 45) return { pressure: -7, interval: 18 };
  if (beat < 135) return { pressure: 10, interval: -12 };
  if (beat < 170) return { pressure: -4, interval: 10 };
  return { pressure: 12, interval: -16 };
}
function phaseArcBias() {
  const dur = Math.max(1, phaseDuration(state.phase));
  const progress = clamp(state.phaseTimer / dur, 0, 1);
  return Math.sin(progress * TAU - Math.PI / 2);
}
function peakLoad() {
  const enemyLoad = Math.max(0, state.enemies.length - 8) / 14;
  const bulletLoad = Math.max(0, enemyBulletPressure() - enemyBulletBudget()) / 8;
  return clamp(enemyLoad + bulletLoad, 0, 1.2);
}

function triggerPhaseSkip() {
  if (state.gameState !== "playing") return;
  if (devSkipCooldown > 0) return;
  devSkipCooldown = DEV_SKIP_COOLDOWN_FRAMES;
  state.bullets = [];
  state.enemyBullets = [];
  state.enemies = [];
  state.pendingSpawns = [];
  state.powerups = [];
  state.boss = null;
  state.bossDeath = null;
  state.bossRecovery = 0;
  state.waveRest = 24;
  state.playerRealm = 0;
  state.waveMood = "open";
  state.waveMoodTimer = 120;
  state.lastWaveTemplateName = null;
  state.phase++;
  state.phaseTimer = 0;
  state.waveTimer = 0;
  state.pressure = 0;
  state.threatScore = 0;
  state.difficulty.grace = 90;
  state.difficulty.ghostGrace = 0;
  state.difficulty.heatStreak = false;
  state.difficulty.threat = Math.max(0.68, state.difficulty.threat - 0.08);
  state.difficulty.target = state.difficulty.threat;
  state.fx.flash = Math.max(state.fx.flash, 8);
  showMessage("PHASE " + state.phase, 90);
  if (state.phase % 4 === 0) spawnBoss();
}
function inDevSkipZone(x, y) { const zoneW = W * 0.15, zoneH = H * 0.15; return x > W - zoneW && y < zoneH; }
function onDevToggleZone(x, y) { return x >= W / 3 && x <= (2 * W) / 3 && y >= 0 && y <= 60; }

function updateIntensityCycle() {
  if (state.boss || state.bossDeath) {
    state.intensityPhase = "normal";
    state.intensityTimer = Math.max(state.intensityTimer, 120);
    return;
  }
  const d = state.difficulty;
  const p = state.player;
  const sinceHit = state.frame - d.lastHitFrame;
  const strong = sinceHit > 720 && d.killStreak >= 5 && state.phase >= 3;
  const fragile = p.hp <= 2 || state.pressure > 74;
  state.intensityTimer--;
  if (state.intensityTimer <= 0) {
    if (state.intensityPhase === "normal") {
      state.intensityPhase = strong ? "surge" : (fragile ? "cooldown" : (Math.random() < 0.6 ? "surge" : "cooldown"));
      state.intensityTimer = state.intensityPhase === "surge" ? 300 + Math.floor(rand(0, 120)) : 170 + Math.floor(rand(0, 90));
    } else if (state.intensityPhase === "surge") {
      state.intensityPhase = "cooldown";
      state.intensityTimer = 180 + Math.floor(rand(0, 100));
    } else {
      state.intensityPhase = "normal";
      state.intensityTimer = 170 + Math.floor(rand(0, 120));
    }
  }
  if (state.intensityPhase === "normal") {

    state.phase++;
    state.phaseTimer = 0;
    state.waveTimer = 0;
    state.waveRest = 18;
    state.waveMood = "open";
    state.waveMoodTimer = 120;

  else if (state.waveMood === "recovery") baseInterval *= 1.22;
  else if (state.waveMood === "rule") baseInterval *= 0.92;
  if (state.difficulty.pacingMemory > 0.45) baseInterval *= 0.90;
  if (state.difficulty.pacingMemory < -0.35) baseInterval *= 1.08;
  if (state.intensityPhase === "surge") baseInterval *= 0.78;
  if (state.intensityPhase === "cooldown") baseInterval *= 1.18;
  if (state.difficulty.grace > 0) baseInterval += 10;
  if (state.difficulty.ghostGrace > 0) baseInterval += 8;
  if (state.player.hp <= 2) baseInterval += 8;
  if (state.player.hp === 1) baseInterval += 6;
  if (state.boss) baseInterval += 12;
  if (state.waveRest > 0) baseInterval += Math.floor(state.waveRest * 0.5);
  const load = peakLoad();
  baseInterval += Math.round(load * 18);
  baseInterval += Math.round((state.pressure - 50) * 0.08);

  else if (state.waveMood === "recovery") threatBudget -= 1.2;
  else if (state.waveMood === "rule") threatBudget += 0.5;
  if (state.difficulty.pacingMemory > 0.45) threatBudget += 0.75;
  if (state.difficulty.pacingMemory < -0.35) threatBudget -= 0.6;
  if (!state.boss && state.pendingSpawns.length === 0 && state.waveTimer >= interval && state.threatScore < threatBudget) {

const TITLE_PATTERNS = {
  vee: [[0,0],[-26,16],[26,16]],
  line: [[-34,0],[0,0],[34,0]],
  arrow: [[0,0],[-24,18],[24,18],[0,34]],
  diamond: [[0,0],[-24,16],[24,16],[0,32]],
  escort: [[0,0],[-18,12],[18,12]]
};

function pickFormationPathType() {
  const r = Math.random();
  if (r < 0.30) return "horizontal";
  if (r < 0.50) return "diagonal";
  if (r < 0.75) return "sweep";
  if (r < 0.90) return "figure_pass";
  return "strafe";
}
function makeTitleFormation(lane = 0, dir = 1, spawnAbove = false) {
  const laneYs = titleLaneYs();
  const patternNames = Object.keys(TITLE_PATTERNS);
  const pattern = patternNames[Math.floor(Math.random() * patternNames.length)];
  const kind = ["red", "orange", "purple"][Math.floor(Math.random() * 3)];
  const pathType = pickFormationPathType();
  const sway = rand(0, TAU);
  const members = 3 + (Math.random() < 0.25 ? 1 : 0);

  let x = 0, y = 0, vx = 0, vy = 0, baseY = laneYs[lane] + rand(-8, 8);
  let pathDuration = 180, speed = rand(0.8, 1.0);
  let startX = 0, startY = 0;

  if (pathType === "horizontal") {
    dir = Math.random() < 0.5 ? 1 : -1;
    startX = dir > 0 ? -rand(180, 320) : W + rand(180, 320);
    x = startX;
    y = baseY;
    vx = dir * rand(0.55, 0.82);
    vy = 0;
    pathDuration = Math.ceil((W + 420) / Math.max(0.55, Math.abs(vx))) + 120;
  } else if (pathType === "diagonal") {
    const corners = [
      [-120, -120, 1, 1],
      [W + 120, -120, -1, 1],
      [-120, H + 120, 1, -1],
      [W + 120, H + 120, -1, -1]
    ];
    const c = corners[Math.floor(Math.random() * corners.length)];
    x = startX = c[0];
    y = startY = c[1];
    vx = c[2] * rand(0.55, 0.78);
    vy = c[3] * rand(0.55, 0.78);
    pathDuration = Math.ceil(Math.max(W, H) / 0.85) + 120;
  } else if (pathType === "sweep") {
    dir = Math.random() < 0.5 ? 1 : -1;
    startX = dir > 0 ? -rand(180, 280) : W + rand(180, 280);
    x = startX;
    baseY = H * rand(0.15, 0.30);
    y = baseY;
    vx = dir * rand(0.50, 0.78);
    vy = 0;
    pathDuration = Math.ceil((W + 420) / Math.max(0.55, Math.abs(vx))) + 140;
  } else if (pathType === "figure_pass") {
    x = startX = W * rand(0.22, 0.78);
    y = startY = -120;
    pathDuration = 240;
    speed = rand(0.55, 0.70);
  } else if (pathType === "strafe") {
    dir = Math.random() < 0.5 ? 1 : -1;
    startX = dir > 0 ? -rand(200, 300) : W + rand(200, 300);
    x = startX;
    y = startY = H * rand(0.40, 0.70);
    vx = dir * rand(0.90, 1.10);
    vy = rand(0.15, 0.25) * (Math.random() < 0.5 ? -1 : 1);
    pathDuration = Math.ceil((W + 420) / Math.max(0.90, Math.abs(vx))) + 120;
  }

  return {
    x, y, vx, vy, baseY,
    dir,
    speed,
    pattern,
    kind,
    pathType,
    pathT: 0,
    pathDuration,
    startX,
    startY,
    enterX: x,
    enterY: y,
    apexY: H * rand(0.35, 0.50),
    sweepAmplitude: rand(60, 120),
    depth: rand(H * 0.35, H * 0.50),
    reversed: false,
    members,
    age: 0,
    sway,
    rot: rand(-0.03, 0.03),
    bank: rand(-0.02, 0.02),
    leaderHistory: [],
    prevX: x,
    prevY: y,
    vx_this_frame: 0,
    vy_this_frame: 0,
    angle: Math.PI / 2,
    removed: false,
    spawnBlockedFrames: 0

}
function initTitleFormations() {
  state.titleFormations = [];
  state.titleLaneCooldowns = [0, 0, 0, 0];
  state.titleLaneCursor = 0;
  state.titleSpawnTimer = 18;
  const startCount = 2;
  for (let i = 0; i < startCount; i++) {
    const lane = i % titleLaneYs().length;
    const dir = lane % 2 === 0 ? 1 : -1;
    const f = makeTitleFormation(lane, dir, true);
    if (f.pathType === "horizontal") {
      f.x = dir > 0 ? -rand(200, 360) : W + rand(200, 360);
    }
    state.titleFormations.push(f);
    state.titleLaneCooldowns[lane] = 90 + lane * 12;
  }
}
function formationSpawnWouldOverlap(f) {
  const sx = f.x, sy = f.y;
  for (const other of state.titleFormations) {
    if (!other || other.removed) continue;
    const d = Math.hypot(other.x - sx, other.y - sy);
    if (d < 160) return true;
  }
  return false;
}
function spawnTitleFormationIfPossible() {
  const lanes = titleLaneYs();
  let lane = -1;
  for (let attempt = 0; attempt < lanes.length; attempt++) {
    const idx = (state.titleLaneCursor + attempt) % lanes.length;
    if (state.titleLaneCooldowns[idx] === 0) {
      lane = idx;
      state.titleLaneCursor = (idx + 1) % lanes.length;
      break;
    }
  }
  if (lane < 0) return false;
  const dir = lane % 2 === 0 ? 1 : -1;
  const f = makeTitleFormation(lane, dir, true);
  if (formationSpawnWouldOverlap(f)) return false;
  state.titleFormations.push(f);
  state.titleLaneCooldowns[lane] = 120;

}
function updateTitleFormations() {
  if (!state.titleFormations.length) initTitleFormations();

  for (let i = state.titleLaneCooldowns.length - 1; i >= 0; i--) {
    state.titleLaneCooldowns[i] = Math.max(0, state.titleLaneCooldowns[i] - 1);
  }

  for (let i = state.titleFormations.length - 1; i >= 0; i--) {
    const f = state.titleFormations[i];
    if (!f || f.removed) continue;
    f.age++;
    f.pathT++;
    f.prevX = f.x;
    f.prevY = f.y;

    const t = f.pathT;
    if (f.pathType === "horizontal") {
      f.x += f.dir * f.speed;
      f.y = f.baseY;
    } else if (f.pathType === "diagonal") {
      f.x += f.vx;
      f.y += f.vy;
    } else if (f.pathType === "sweep") {
      f.x += f.dir * f.speed;
      f.y = f.baseY + Math.sin(t * 0.022) * f.sweepAmplitude;
    } else if (f.pathType === "figure_pass") {
      const half = Math.max(1, Math.floor(f.pathDuration / 2));
      const riseTarget = f.apexY;
      const startY = f.startY;
      const fallY = -120;
      if (t <= half) {
        const u = clamp(t / half, 0, 1);
        f.y = startY + easeOutCubic(u) * (riseTarget - startY);
      } else {
        const u = clamp((t - half) / half, 0, 1);
        f.y = riseTarget - easeOutCubic(u) * (riseTarget - fallY);
      }
      f.x = f.enterX + Math.sin(t * 0.03) * 180;
    } else if (f.pathType === "strafe") {
      f.x += f.dir * f.speed;
      f.y += f.vy;
    }

    f.vx_this_frame = f.x - f.prevX;
    f.vy_this_frame = f.y - f.prevY;
    f.angle = Math.atan2(f.vy_this_frame, f.vx_this_frame) - Math.PI / 2;

    f.leaderHistory.push({ x: f.x, y: f.y });
    if (f.leaderHistory.length > 12) f.leaderHistory.shift();

    const offscreenMargin = 260;
    if (
      f.pathT > f.pathDuration + 60 ||
      f.x < -offscreenMargin || f.x > W + offscreenMargin ||
      f.y < -180 || f.y > H + 180
    ) {
      f.removed = true;
      state.titleFormations.splice(i, 1);
    }
  }

  state.titleSpawnTimer--;
  if (state.titleSpawnTimer <= 0 && state.titleFormations.length < 3) {
    if (!spawnTitleFormationIfPossible()) {
      state.titleSpawnTimer = 1;
    } else {
      state.titleSpawnTimer = Math.floor(rand(75, 120));
    }
  }

  if (state.titleFormations.length > 3) state.titleFormations.length = 3;
}

    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-4, 8);

    ctx.lineTo(-4, 11);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(4, 8);
    ctx.lineTo(10, 12);
    ctx.lineTo(4, 11);

    ctx.globalAlpha = bodyAlpha;

    ctx.save();
    ctx.translate(p.x, p.y + bob);

    ctx.globalCompositeOperation = "lighter";
    ctx.shadowColor = "rgba(80,255,255,1.0)";

    const vx = p.vx, vy = p.vy;

      { dist: 4, alpha: 0.22 },
      { dist: 8, alpha: 0.13 },
      { dist: 13, alpha: 0.07 }

      "rgba(82,126,136,0.52)",

    );

    ctx.restore();

}

  const playRect = getPlayButtonRect();

  if (hitRect(callRect, x, y)) {
    callSignEditing = true;
    return true;
  }
  if (hitRect(playRect, x, y)) {
    playBtnPointerDown = true;
    playBtnPointerInside = true;
    playBtnHold = 0;
    return true;
  }
  if (hitRect(iconRects.settings, x, y)) {
    if (titleSubState === "settings" && titlePanelTarget === 1) { titleSubState = "main"; titlePanelTarget = 0; codexDetailType = null; }
    else { titleSubState = "settings"; titlePanelTarget = 1; codexDetailType = null; }
    return true;
  }
  if (hitRect(iconRects.codex, x, y)) {
    if (titleSubState === "codex" && titlePanelTarget === 1) { titleSubState = "main"; titlePanelTarget = 0; codexDetailType = null; }
    else { titleSubState = "codex"; titlePanelTarget = 1; }
    return true;
  }

  if (titlePanelHit(x, y)) {
    if (titleSubState === "settings") {
      const r = titleSettingsRects();
      if (hitRect(r.closeRect, x, y)) { titleSubState = "main"; titlePanelTarget = 0; codexDetailType = null; return true; }
      if (hitRect(r.low, x, y)) { settingMaxParticles = 300; MAX_PARTICLES = settingMaxParticles; saveSettings(); return true; }
      if (hitRect(r.med, x, y)) { settingMaxParticles = 600; MAX_PARTICLES = settingMaxParticles; saveSettings(); return true; }
      if (hitRect(r.high, x, y)) { settingMaxParticles = 900; MAX_PARTICLES = settingMaxParticles; saveSettings(); return true; }
      if (hitRect(r.shake, x, y)) { settingScreenShake = !settingScreenShake; saveSettings(); return true; }
      return true;
    }
    if (titleSubState === "codex") {
      const r = titleCodexRects();
      if (hitRect(r.closeRect, x, y)) { titleSubState = "main"; titlePanelTarget = 0; codexDetailType = null; return true; }
      if (codexDetailType) {
        const detailCard = { x: r.panel.x + 18, y: r.panel.y + 46, w: r.panel.w - 36, h: r.panel.h - 62 };
        const backRect = { x: detailCard.x + 10, y: detailCard.y + 10, w: 28, h: 22 };
        if (hitRect(backRect, x, y)) { codexDetailType = null; return true; }
        if (!(x >= detailCard.x && x <= detailCard.x + detailCard.w && y >= detailCard.y && y <= detailCard.y + detailCard.h)) {
          codexDetailType = null;
          return true;
        }
        return true;
      }
      for (const type of ["red", "orange", "purple", "phantom", "boss_standard", "boss_wraith"]) {
        const card = r.rects[type];
        if (!hitRect(card, x, y)) continue;
        if (codexDiscovered[type]) {
          codexDetailType = type;
        }
        return true;
      }
      return true;
    }
  }
  if (titleSubState !== "main") {
    titleSubState = "main";
    titlePanelTarget = 0;
    codexDetailType = null;
    return true;
  }
  return false;
}
function handleGameOverPointerDown(x, y) {
  const buttons = getGameOverButtons();
  if (hitRect(buttons.respawn, x, y)) {
    respawnPointerDown = true;
    respawnPointerInside = true;
    respawnHold = 0;
    return true;
  }
  if (hitRect(buttons.title, x, y)) {
    setupSession("start");
    return true;
  }
  return false;
}
canvas.addEventListener("pointerdown", (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  if (state.gameState === "gameover") {
    if (handleGameOverPointerDown(x, y)) return;
    return;
  }
  if (state.gameState === "playing") {
    if (inDevSkipZone(x, y)) { triggerPhaseSkip(); return; }
    if (onDevToggleZone(x, y)) { state.devStatsVisible = !state.devStatsVisible; return; }
  }
  if (state.gameState !== "playing") {
    if (handleTitlePointerDown(x, y)) return;
    return;
  }
  canvas.setPointerCapture(e.pointerId);
  if (onActionZone(x, y)) { attemptGhost(); return; }
  if (onJoystickZone(x, y)) {
    state.joystick.active = true;
    state.joystick.id = e.pointerId;
    state.joystick.cx = 76;
    state.joystick.cy = H - 76;
    updateJoystickFromPointer(e);
  }
});
canvas.addEventListener("pointermove", (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  if (state.gameState !== "playing") {
    if (playBtnPointerDown) {
      const playRect = getPlayButtonRect();
      playBtnPointerInside = hitRect(playRect, x, y);
    }
    if (respawnPointerDown) {
      const respawnRect = getGameOverButtons().respawn;
      respawnPointerInside = hitRect(respawnRect, x, y);
    }
    return;
  }
  if (state.joystick.active && state.joystick.id === e.pointerId) {
    updateJoystickFromPointer(e);
    const mag = Math.hypot(state.joystick.ax, state.joystick.ay);
    if (mag > 1) { state.joystick.ax /= mag; state.joystick.ay /= mag; }
  }
  if (playBtnPointerDown) {
    const playRect = getPlayButtonRect();
    playBtnPointerInside = hitRect(playRect, x, y);
  }
});
function updateJoystickFromPointer(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  const dx = x - state.joystick.cx, dy = y - state.joystick.cy;
  const d = Math.hypot(dx, dy);
  const r = state.joystick.radius;
  const s = d > r ? r / d : 1;
  state.joystick.ax = (dx * s) / r;
  state.joystick.ay = (dy * s) / r;
}
function endPointer(e) {
  if (state.joystick.active && state.joystick.id === e.pointerId) {
    state.joystick.active = false;
    state.joystick.id = null;
    state.joystick.ax = 0;
    state.joystick.ay = 0;
  }
  if (state.gameState !== "playing") {
    playBtnPointerDown = false;
    playBtnPointerInside = false;
    playBtnHold = 0;
    respawnPointerDown = false;
    respawnPointerInside = false;
    respawnHold = 0;
  }
}
canvas.addEventListener("pointerup", endPointer);
canvas.addEventListener("pointercancel", endPointer);
function onActionZone(x, y) { const cx = W - 76, cy = H - 76; return Math.hypot(x - cx, y - cy) <= 42; }
function onJoystickZone(x, y) { const cx = 76, cy = H - 76; return Math.hypot(x - cx, y - cy) <= 62; }
function isMoveKey(key) {
  return key === "ArrowUp" || key === "ArrowDown" || key === "ArrowLeft" || key === "ArrowRight" ||
         key === "w" || key === "a" || key === "s" || key === "d" ||
         key === "W" || key === "A" || key === "S" || key === "D";
}
window.addEventListener("keydown", (e) => {
  if (callSignEditing) {
    setCallSignFromInputKey(e);
    return;
  }
  const k = e.key;
  if (state.gameState === "playing") {
    if (isMoveKey(k)) {
      e.preventDefault();
      if (k === "ArrowUp" || k === "w" || k === "W") state.keyboard.up = true;
      if (k === "ArrowDown" || k === "s" || k === "S") state.keyboard.down = true;
      if (k === "ArrowLeft" || k === "a" || k === "A") state.keyboard.left = true;
      if (k === "ArrowRight" || k === "d" || k === "D") state.keyboard.right = true;
      return;
    }
    if (!e.repeat && !e.ctrlKey && !e.altKey && !e.metaKey) { e.preventDefault(); attemptGhost(); }
  }
});
window.addEventListener("keyup", (e) => {
  const k = e.key;
  if (k === "ArrowUp" || k === "w" || k === "W") state.keyboard.up = false;
  if (k === "ArrowDown" || k === "s" || k === "S") state.keyboard.down = false;
  if (k === "ArrowLeft" || k === "a" || k === "A") state.keyboard.left = false;
  if (k === "ArrowRight" || k === "d" || k === "D") state.keyboard.right = false;
});
window.addEventListener("beforeunload", () => {
  if (highScoreDirty) saveHighScore();
  saveCallSign();
  saveSettings();
  saveCodexDiscovered();
});

function update() {
  if (devSkipCooldown > 0) devSkipCooldown--;
  state.frame++;

  if (state.gameState === "start") {
    updateTitleScreen();
    updateStars();
    updateParticles();
    return;
  }

  if (state.gameState === "gameover") {
    updateStars();
    updateParticles();
    const GAME_OVER_SHAKE_FRAMES = 180;
    if (state.gameOverShakeTimer > 0) {
      const t = 1 - state.gameOverShakeTimer / GAME_OVER_SHAKE_FRAMES;
      state.gameOverShake = 6 * Math.exp(-4.8 * t);
      state.gameOverShakeTimer--;
    } else {
      state.gameOverShake = 0;
    }
    updateRespawnHold();
    return;
  }

  state.framesSinceLastDrop++;
  if (state.powerupDropCooldown > 0) state.powerupDropCooldown--;
  state.comboPulse = Math.max(0, state.comboPulse - 1);

  updateStars();
  updateWavesAndPhaseAndPressure();
  updatePlayer();
  updateWingmen();
  updateBullets();
  updateEnemies();
  updateBoss();
  updateBossDeathIfNeeded();
  updatePowerups();
  updateCollisions();
  updateParticles();

  state.fx.shake = Math.max(0, state.fx.shake - 0.7);
  state.fx.flash = Math.max(0, state.fx.flash - 0.8);

  if (state.messageTimer > 0) {
    state.messageTimer--;
    if (state.messageTimer <= 0) showNextMessage();
  } else if (state.messageQueue.length > 0 && !state.message) {
    showNextMessage();
  }

  if (encounterCard) {
    encounterCard.timer++;
    if (encounterCard.timer >= ENCOUNTER_CARD_DURATION) encounterCard = null;
  } else if (encounterQueue.length > 0) {
    encounterCard = { type: encounterQueue.shift(), timer: 0, maxTimer: ENCOUNTER_CARD_DURATION };
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

loadHighScore();
loadCallSign();
loadSettings();
loadCodexDiscovered();
resize();
setupSession("start");
window.addEventListener("resize", resize);
loop();
</script>
