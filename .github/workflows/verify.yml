name: Verify competition build

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: npm ci --prefix functions
      - name: Install browser runtime
        run: npx playwright install --with-deps chromium
      - name: Syntax check browser and Function scripts
        run: |
          find src -name '*.js' -print0 | xargs -0 -n1 node --check
          find functions -maxdepth 1 -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run all tests
        run: node --test tests/*.test.js
      - name: Verify Firestore authorization in the emulator
        run: npm run test:rules
      - name: Dependency audit
        run: |
          npm audit --omit=dev --audit-level=high
          npm audit --prefix functions --omit=dev --audit-level=high
      - name: Production build
        run: npm run build
      - name: Load Function module and validate Firebase config
        run: |
          node -e "require('./functions/index.js'); console.log('functions loaded')"
          node -e "JSON.parse(require('fs').readFileSync('firestore.indexes.json')); JSON.parse(require('fs').readFileSync('firebase.json')); console.log('firebase json valid')"

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
