name: Split legacy game

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/split-legacy-game.yml
      - scripts/split-legacy-game.mjs
      - js/legacyGame.js

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Split legacy game into ordered parts
        run: |
          node scripts/split-legacy-game.mjs

      - name: Commit generated game parts
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html js/game-parts
          git commit -m "Split legacy game into ordered script parts"
          git push
