name: Smoke test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f index.html
          test -f css/style.css
          test -f js/legacyGame.js
          test -d js/game-parts
          test -f scripts/extract-legacy-game.mjs
          test -f scripts/split-legacy-game.mjs
          test -f scripts/validate-split.mjs

      - name: Parse JavaScript helpers
        run: |
          node --check scripts/extract-legacy-game.mjs
          node --check scripts/split-legacy-game.mjs
          node --check scripts/validate-split.mjs

      - name: Validate generated split
        run: |
          node scripts/validate-split.mjs
